<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Funk AI – Zed Xool</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --green: #2e7d32;
            --green-light: #4caf50;
            --bg: #f8faf9;
            --card: #ffffff;
            --text: #1a1a1a;
            --text-light: #555;
            --border: #e0e0e0;
            --radius: 18px;
            --shadow: 0 4px 20px rgba(0,0,0,0.04);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .navbar {
            background: var(--card);
            border-bottom: 1px solid var(--border);
            padding: 0 2rem;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: var(--shadow);
            z-index: 10;
        }
        .navbar .logo {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--green);
            letter-spacing: -0.5px;
        }
        .navbar .logo i {
            font-size: 1.8rem;
            color: var(--green);
        }
        .navbar a {
            color: var(--text-light);
            text-decoration: none;
            font-weight: 500;
            transition: 0.3s;
        }
        .navbar a:hover { color: var(--green); }
        .main-container {
            flex: 1;
            display: flex;
            overflow: hidden;
        }
        .sidebar {
            width: 260px;
            background: var(--card);
            border-right: 1px solid var(--border);
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }
        .sidebar h4 {
            color: var(--text-light);
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 1px;
            margin-bottom: 0.3rem;
        }
        .sidebar .history-item {
            padding: 0.7rem 1rem;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.2s;
            background: #f5f5f5;
            font-size: 0.9rem;
            color: #333;
        }
        .sidebar .history-item:hover {
            background: #e8f5e9;
            color: var(--green);
        }
        .chat-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 2rem;
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding-right: 0.5rem;
            margin-bottom: 1.5rem;
        }
        .message {
            display: flex;
            margin-bottom: 1.5rem;
            animation: slideUp 0.3s ease;
        }
        .message.user { justify-content: flex-end; }
        .message .avatar {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            margin: 0 0.8rem;
            flex-shrink: 0;
        }
        .message.user .avatar {
            background: var(--green);
            color: #fff;
        }
        .message.assistant .avatar {
            background: #e8f5e9;
            color: var(--green);
        }
        .message .bubble {
            max-width: 75%;
            padding: 0.9rem 1.2rem;
            border-radius: 18px;
            font-size: 0.95rem;
            line-height: 1.5;
            word-wrap: break-word;
            position: relative;
        }
        .message.user .bubble {
            background: var(--green);
            color: #fff;
            border-bottom-right-radius: 4px;
        }
        .message.assistant .bubble {
            background: #f5f5f5;
            color: #333;
            border-bottom-left-radius: 4px;
            border: 1px solid #eee;
        }
        .typing .bubble {
            background: transparent !important;
            color: #999;
            font-style: italic;
            border: none;
        }
        .input-area {
            display: flex;
            gap: 0.8rem;
            align-items: center;
            background: var(--card);
            border-radius: 40px;
            padding: 0.5rem 0.5rem 0.5rem 1.5rem;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
        }
        .input-area input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text);
            font-size: 0.95rem;
            outline: none;
            padding: 0.6rem 0;
        }
        .input-area input::placeholder { color: #aaa; }
        .input-area button {
            background: var(--green);
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            color: #fff;
            font-size: 1.1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
        }
        .input-area button:hover {
            background: var(--green-light);
            transform: scale(1.05);
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @media (max-width: 768px) {
            .sidebar { display: none; }
            .chat-section { padding: 1rem; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">
            <i class="fa-solid fa-robot"></i> Funk AI
        </div>
        <a href="index.html"><i class="fa-solid fa-arrow-left"></i> Back to Hub</a>
    </nav>

    <div class="main-container">
        <aside class="sidebar">
            <h4>Chat History</h4>
            <div class="history-item">👋 Welcome</div>
        </aside>

        <main class="chat-section">
            <div class="chat-messages" id="chatMessages">
                <div class="message assistant">
                    <div class="avatar"><i class="fa-solid fa-robot"></i></div>
                    <div class="bubble">Hey! I'm Funk AI, powered by DeepSeek. How can I assist you today?</div>
                </div>
            </div>
            <div class="input-area">
                <input type="text" id="userInput" placeholder="Message Funk AI..." onkeypress="if(event.key==='Enter') sendMessage()">
                <button onclick="sendMessage()"><i class="fa-solid fa-paper-plane"></i></button>
            </div>
        </main>
    </div>

    <script src="funk-ai.js"></script>
</body>
</html>
