<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Events – Zed Xool</title>
  <style>
    :root {
      --primary: #2563eb
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      margin: 0;
      background: #f8fafc
    }

    .navbar {
      background: var(--primary);
      padding: 0.8rem 2rem;
      color: white;
      display: flex;
      justify-content: space-between
    }

    .navbar a {
      color: white;
      text-decoration: none;
      margin: 0 0.8rem
    }

    .container {
      max-width: 900px;
      margin: 2rem auto;
      display: flex;
      flex-wrap: wrap;
      gap: 1.5rem;
      padding: 0 1rem
    }

    .event-card {
      background: white;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
      width: 300px
    }

    .event-card img {
      width: 100%;
      height: 200px;
      object-fit: cover
    }

    .event-card .info {
      padding: 1rem
    }
  </style>
</head>

<body>
  <nav class="navbar"><a href="index.html"><img src="images/logo.png" height="40"></a>
    <div><a href="index.html">Home</a><a href="events.html" class="active">Events</a></div>
  </nav>
  <div class="container" id="eventsContainer"></div>
  <script>
    const events = JSON.parse(localStorage.getItem('zx_events') || '[]');
    document.getElementById('eventsContainer').innerHTML = events.length ? events.map(e => `<div class="event-card"><img src="${e.image_url || 'https://via.placeholder.com/400x200'}"><div class="info"><h3>${e.title}</h3><p>${e.date} – ${e.venue}</p><p>${e.desc}</p></div></div>`).join('') : '<p>No events.</p>';
  </script>
</body>

</html>
